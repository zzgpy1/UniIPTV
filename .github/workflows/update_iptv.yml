name: "IPTV 源智能更新与整理"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 缓存 Python 依赖
      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 移除 ffmpeg 缓存，改为直接安装
      - name: 安装 ffmpeg（包含 ffprobe）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 缓存 IP 数据库（避免每次下载）
      - name: 缓存 IP 数据库
        id: cache-ipdb
        uses: actions/cache@v4
        with:
          path: qqwry.dat
          key: ${{ runner.os }}-qqwry-dat

      # 更新 IP 数据库（仅在缓存未命中时运行）
      - name: 更新 IP 数据库
        if: steps.cache-ipdb.outputs.cache-hit != 'true'
        run: python update_ipdb.py
        continue-on-error: true

      # 验证数据库文件存在
      - name: 验证数据库文件
        run: |
          if [ -f "qqwry.dat" ]; then
            echo "✅ IP 数据库文件存在"
            ls -lh qqwry.dat
          else
            echo "⚠️ IP 数据库文件不存在，将跳过 IP 归属地解析"
          fi

      - name: 执行 IPTV 更新脚本
        run: python run.py
        env:
          MAX_WORKERS: 10
          TIMEOUT: 10
          FFMPEG_ENABLE: true
          ENABLE_RETRY: true
          ENABLE_IP_RESOLVE: true
          ENABLE_REGION_FILTER: false
          PREFERRED_LOCATION: ""
          PREFERRED_ISP: ""

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
