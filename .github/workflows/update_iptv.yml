name: "IPTV 源智能更新与整理"

on:
  schedule:
    - cron: "0 */6 * * *"    # 每6小时运行一次
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 缓存 Python 依赖
      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 新增：缓存 IPTV 数据库文件（使用 GitHub Actions 原生缓存）
      - name: 缓存 IPTV 数据库
        id: cache-db
        uses: actions/cache@v4
        with:
          path: iptv_cache.db
          key: ${{ runner.os }}-iptv-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      # 新增：显示缓存命中状态
      - name: 显示数据库缓存状态
        run: |
          if [ -f "iptv_cache.db" ]; then
            echo "✅ 数据库缓存已恢复，文件大小: $(ls -lh iptv_cache.db | awk '{print $5}')"
          else
            echo "⚠️ 未找到数据库缓存，将新建数据库"
          fi

      - name: 安装 ffmpeg（包含 ffprobe）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 缓存 IP 数据库（纯真IP库）
      - name: 缓存 IP 数据库
        id: cache-ipdb
        uses: actions/cache@v4
        with:
          path: qqwry.dat
          key: ${{ runner.os }}-qqwry-dat
          restore-keys: |
            ${{ runner.os }}-qqwry-dat

      # 更新 IP 数据库
      - name: 更新 IP 数据库
        run: python update_ipdb.py
        continue-on-error: true

      - name: 验证数据库文件
        run: |
          if [ -f "qqwry.dat" ]; then
            echo "✅ IP 数据库文件存在"
            ls -lh qqwry.dat
          else
            echo "⚠️ IP 数据库文件不存在，将跳过 IP 归属地解析"
          fi

      - name: 执行 IPTV 更新脚本
        run: python run.py
        env:
          MAX_WORKERS: 10
          TIMEOUT: 10
          FFMPEG_ENABLE: true
          ENABLE_RETRY: true
          ENABLE_IP_RESOLVE: true
          ENABLE_REGION_FILTER: false
          PREFERRED_LOCATION: ""
          PREFERRED_ISP: ""

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
