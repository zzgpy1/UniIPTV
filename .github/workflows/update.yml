name: UniIPTV Update

on:
  schedule:
    - cron: '0 2 * * *'          # UTC 2:00 (北京时间 10:00)
  workflow_dispatch:              # 手动触发
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'config/**'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Speed Results
        uses: actions/cache@v4
        with:
          path: .cache
          key: speed-cache-${{ github.run_id }}
          restore-keys: speed-cache-

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run UniIPTV Main Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}   # 可选，用于AI发现源
        run: python src/main.py

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptv-output
          path: output/
          retention-days: 7

      - name: Commit and Push Output Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ -f
          git diff --staged --quiet || git commit -m "Auto update IPTV sources at $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main
        continue-on-error: true

  deploy-to-cloudflare:
    runs-on: ubuntu-latest
    needs: build-and-update
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: uni-iptv
          directory: ./output
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
